name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: macos-latest
            cc: clang
          - os: windows-latest
            cc: gcc
            name: windows-mingw
          - os: windows-latest
            cc: vcc
            name: windows-msvc
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.name || matrix.os }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        if: matrix.cc == 'vcc'
        uses: ilammy/msvc-dev-cmd@v1

      # Install Nim AFTER MSVC setup so PATH isn't clobbered
      - name: Install Nim (POSIX)
        if: runner.os != 'Windows'
        run: |
          curl https://nim-lang.org/choosenim/init.sh -sSf | bash -s -- -y
          echo "$HOME/.nimble/bin" >> "$GITHUB_PATH"

      - name: Install Nim (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -L https://nim-lang.org/download/nim-2.2.0_x64.zip -o nim.zip
          unzip -q nim.zip
          echo "$PWD/nim-2.2.0/bin" >> "$GITHUB_PATH"

      - name: Build test library (MSVC)
        if: matrix.cc == 'vcc'
        shell: bash
        run: cl //LD //Fe:tests/testlib.dll tests/testlib.c

      - name: Build test library (GCC/Clang)
        if: matrix.cc != 'vcc'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            gcc -shared -o tests/testlib.dll tests/testlib.c
          elif [ "$RUNNER_OS" = "macOS" ]; then
            cc -shared -fPIC -o tests/libtestlib.dylib tests/testlib.c
          else
            gcc -shared -fPIC -o tests/libtestlib.so tests/testlib.c
          fi

      - name: Run tests (MSVC)
        if: matrix.cc == 'vcc'
        shell: bash
        run: |
          export PATH="./tests:$PATH"
          nim c -r --cc:vcc --path:src "--passC:/I." tests/test_softlink.nim

      - name: Run tests (GCC/Clang)
        if: matrix.cc != 'vcc'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            export LD_LIBRARY_PATH=./tests
          elif [ "$RUNNER_OS" = "macOS" ]; then
            export DYLD_LIBRARY_PATH=./tests
          elif [ "$RUNNER_OS" = "Windows" ]; then
            export PATH="./tests:$PATH"
          fi
          nim c -r --path:src --passC:-I. tests/test_softlink.nim
